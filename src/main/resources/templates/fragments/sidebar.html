<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar">
    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">
            <h2>Dokumen [[${secondary}]]</h2>
            <input type="text" placeholder="Search" class="search-box" />
        </div>

        <ul class="tree">
            <li th:each="node : ${sidebar}">
                <div th:replace="fragments/sidebar :: treeNode(${node})"></div>
            </li>
        </ul>

    </div>
</div>

<!-- ============================= -->
<!-- RECURSIVE NODE -->
<!-- ============================= -->
<div th:fragment="treeNode(node)">

    <!-- ===== FOLDER ===== -->
    <div th:if="${node.folder}">
        <div class="folder-header folder-toggle">
            <span class="icon">📂</span>
            <span class="folder-name" style="font-weight: bold;" th:text="${node.name}"></span>
        </div>

        <ul class="hidden">
            <li th:each="child : ${node.children}">
                <div th:replace="fragments/sidebar :: treeNode(${child})"></div>
            </li>

            <li th:if="${node.children.size() == 0}">
                <span>file belum ada, next update...</span>
            </li>
        </ul>
    </div>

    <!-- ===== FILE ===== -->
    <div th:if="${!node.folder}">
        <span class="file-icon">📄</span>
        <span class="file-link"
              th:attr="data-file=${node.path}"
              th:text="${node.name}"></span>
    </div>

</div>

</body>
</html>
